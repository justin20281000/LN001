
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Dinner Menu Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <button id="theme-toggle" class="control-btn">Dark Mode</button>
        <button id="lang-toggle" class="control-btn">한국어</button>
    </div>
    <div class="container">
        <h1 id="main-heading">What's for Dinner?</h1>
        <div class="menu-display">
            <dinner-menu></dinner-menu>
        </div>
        <button id="generate-btn">Recommend Menu</button>
        
        <div class="contact-section">
            <h2 id="contact-heading">Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/mqeddqbe" method="POST" class="contact-form">
                <input type="email" name="email" id="contact-email" placeholder="Your Email" required>
                <textarea name="message" id="contact-message" placeholder="Your Message" required></textarea>
                <button type="submit" id="contact-submit">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
